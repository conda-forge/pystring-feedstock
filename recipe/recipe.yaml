schema_version: 1

context:
  name: pystring
  version: "1.2.0"
  build_number: 0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/imageworks/pystring/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 020a603a757ba1e429f4b1ea6feb3afbe0fb34bcafa355032e1f1b8a0019d198
  patches:
    - if: win
      then:
        - fix_cmake_win.patch

build:
  number: ${{ build_number }}

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - cmake >=3.10
    - if: unix
      then:
        - make
    - ninja
  run_exports:
    - ${{ pin_subpackage(name, upper_bound='x') }}

tests:
  - package_contents:
      strict: true
      include:
        - pystring/**
      lib:
        - pystring
      files:
        - if: unix
          then: lib/cmake/pystring/*.cmake
        - if: win
          then: Library/lib/cmake/pystring/*.cmake

about:
  homepage: https://github.com/imageworks/pystring
  license: BSD-3-Clause
  license_file: LICENSE
  summary: C++ functions matching the interface and behavior of python string methods with std::string
  repository: https://github.com/imageworks/pystring
  description: |
    Pystring is a collection of C++ functions which match the interface and
    behavior of python's string class methods using std::string. Implemented in
    C++, it does not require or make use of a python interpreter. It provides
    convenience and familiarity for common string operations not included in the
    standard C++ library.

extra:
  recipe-maintainers:
    - carlodri
